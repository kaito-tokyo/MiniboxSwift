name: Check CI

# file: .github/workflows/check.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# version: 1.0.0
# date: 2026-04-25

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
  merge_group:

permissions: {}

env:
  HOMEBREW_NO_ANALYTICS: "1"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_ENV_HINTS: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  check-swift-format:
    name: Check swift-format
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install swift-format with Linuxbrew
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          /home/linuxbrew/.linuxbrew/bin/brew install swift-format

      - name: Check with swift-format
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          /home/linuxbrew/.linuxbrew/bin/swift-format lint --recursive . --strict

  check-yaml-format:
    name: Check yamlfmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install yamlfmt with Linuxbrew
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          /home/linuxbrew/.linuxbrew/bin/brew install yamlfmt

      - name: Check with yamlfmt
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          /home/linuxbrew/.linuxbrew/bin/yamlfmt ーlint .

  accept-check:
    name: Accept Check CI
    needs:
      - check-swift-format
      - check-yaml-format
    runs-on: ubuntu-slim
    permissions: {}
    steps:
      - name: Accept plugin
        run: |
          echo "Check CI passed."
